<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript DOM, selecting by id and class</title>
    <style>
        .box{
            height: 30px;
            width: 30px;
            padding: 34px;
            margin: 34px;
            border: 2px solid black;
        }
    </style>
</head>
<body>

    <div class="container">
        <div  class="box">Hamza is best</div>
        <div class="box">Hamza is best</div>
        <div id="green" class="box green">Hamza is best</div>
        <div class="box">Hamza is best</div>
        <div id="red" class="box">Hamza is best</div>
    </div>
    <script src="script.js"> </script>
</body>
</html>
