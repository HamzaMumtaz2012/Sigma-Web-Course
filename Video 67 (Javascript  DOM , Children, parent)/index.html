<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript DOM parent, children</title>
    <style>
        .box{
            height: 56px;
            width: 56px;
            border: 2px solid ;
        }
    </style>
     
    
</head>
<body>

    <div class="container">
        <div class="box">box1</div>
        <div class="box">box2</div>
        <div class="box">box3</div>
        <div class="box">box4</div>
        <div class="box">box5</div>
    </div>

    <script>
        
        console.log(document.body.childNodes )
    console.log( document.body.firstElementChild)
    console.log(document.body.firstElementChild.children[2])
    document.body.firstElementChild.children[2].style.color = "green" 
    document.body.firstElementChild.children[2].style.backgroundColor = "red" 
    document.body.style.backgroundColor = "black";
document.body.style.color = "white";

    </script>
</body>
</html>
